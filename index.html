<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dist/css/styles.css">
    <title>Welcome to PizzaNet!</title>
</head>
<body>
<header class="hero">
    <h1>Welcome to PizzaNet!</h1>
    <p>Your one-stop shop for all things pizza. Explore our menu, order online, and enjoy delicious pizza delivered right to your door.</p>
</header>

<main class="container">
<section class="menu">
    <h2>Our Menu</h2>
        <p>Check out our delicious selection of pizzas, pasta, and drinks.</p>
            
<form class="order-form">
<div class="form-group">
    <label for="name">Name:</label>
    <input type="text" id="name">
</div>
    
<div class="form-group">
    <label for="address">Address:</label>
    <input type="text" id="address">
</div>
                
<div class="form-group">
    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone">
</div>
</form>
                
<button type="button" class="btn-primary">Click Me</button>

</main>
</body>
</html>
